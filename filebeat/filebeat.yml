# Filebeat configuration for collecting all Docker container logs
# Uses Docker autodiscovery so new containers are picked up automatically.

filebeat.autodiscover:
  providers:
    - type: docker
      # Hints-based autodiscovery: containers can customise collection via
      # Docker labels (e.g. co.elastic.logs/multiline.*).
      # Containers with label co.elastic.logs/enabled=false are auto-skipped.
      hints.enabled: true
      hints.default_config:
        type: container
        paths:
          - /var/lib/docker/containers/${data.container.id}/*.log

# Enrich every log event with Docker metadata (image, container name, labels, etc.)
processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  - add_host_metadata: ~
  - add_fields:
      target: ""
      fields:
        log_collector: filebeat

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  username: "${ELASTIC_USERNAME:elastic}"
  password: "${ELASTIC_PASSWORD}"
  # One index per day, prefixed so all container logs are easy to find
  index: "docker-logs-%{+yyyy.MM.dd}"

# Point Filebeat at Kibana so it can push the index template & dashboard
setup.kibana:
  host: "kibana:5601"
  username: "${ELASTIC_USERNAME:elastic}"
  password: "${ELASTIC_PASSWORD}"

setup.template.name: "docker-logs"
setup.template.pattern: "docker-logs-*"
# Disable Filebeat's own ILM setup — lifecycle is managed by the
# server-side 'docker-logs-policy' ILM policy (see scripts/setup-ilm.sh).
setup.ilm.enabled: false

# Reduce noise in Filebeat's own logs
logging.level: warning
logging.to_files: false
