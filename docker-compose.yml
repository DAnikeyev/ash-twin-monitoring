
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD in .env}
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_BIND_HOST:-127.0.0.1}:${ELASTICSEARCH_PORT}:9200"
    networks:
      - elk
    restart: unless-stopped
    mem_limit: 1536m
    labels:
      co.elastic.logs/enabled: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health"]
      interval: 20s
      timeout: 10s
      retries: 10

  kibana-user-setup:
    image: curlimages/curl:8.7.1
    container_name: kibana-user-setup
    labels:
      co.elastic.logs/enabled: "false"
    command:
      - /bin/sh
      - -c
      - |
        until curl -s -u "elastic:${ELASTIC_PASSWORD}" http://elasticsearch:9200/_security/_authenticate >/dev/null; do
          sleep 3
        done
        printf '{"password":"%s","roles":["superuser"],"full_name":"Kibana Admin"}' "${KIBANA_LOGIN_PASSWORD}" \
          | curl -sS -u "elastic:${ELASTIC_PASSWORD}" -X POST "http://elasticsearch:9200/_security/user/${KIBANA_LOGIN_USERNAME}" -H "Content-Type: application/json" --data-binary @-
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD in .env}
      - KIBANA_LOGIN_USERNAME=${KIBANA_LOGIN_USERNAME:?Set KIBANA_LOGIN_USERNAME in .env}
      - KIBANA_LOGIN_PASSWORD=${KIBANA_LOGIN_PASSWORD:?Set KIBANA_LOGIN_PASSWORD in .env}
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: "no"

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_SERVICEACCOUNTTOKEN=${KIBANA_SERVICE_TOKEN:?Set KIBANA_SERVICE_TOKEN in .env}
      - SERVER_PUBLICBASEURL=${KIBANA_PUBLIC_BASE_URL:-http://localhost:${KIBANA_PORT}}
      - SERVER_NAME=${KIBANA_SERVER_NAME:-localhost}
    ports:
      - "${KIBANA_BIND_HOST:-127.0.0.1}:${KIBANA_PORT}:5601"
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana-user-setup:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 1024m
    labels:
      co.elastic.logs/enabled: "false"

  filebeat:
    build:
      context: ./filebeat
      args:
        ELASTIC_VERSION: ${ELASTIC_VERSION}
    image: ash-twin-monitoring-filebeat:${ELASTIC_VERSION}
    container_name: filebeat
    user: root
    command: filebeat -e -strict.perms=false
    environment:
      - ELASTIC_USERNAME=${ELASTIC_USERNAME:-elastic}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD in .env}
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat-data:/usr/share/filebeat/data
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    labels:
      co.elastic.logs/enabled: "false"

networks:
  elk:
    driver: bridge

volumes:
  elasticsearch-data:
    driver: local
  filebeat-data:
    driver: local
